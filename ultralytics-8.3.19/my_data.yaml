# E:/project/fire_detection/ultralytics-8.3.19/ultralytics/cfg/datasets/my_data.yaml

# ========== 路径 ==========
path: /root/autodl-tmp/fire_detection/ultralytics-8.3.19/D-Fire       # 数据集根目录
train: train/images
val: val/images         # 之前用 split 划分出来的
test: test/images

# ========== 类别（核心）==========
nc: 2
names: ['smoke', 'fire']   # 0→smoke, 1→fire，顺序决定模型输出索引

# ========== 判读用的扩展字段（可选，供后处理代码读取）==========
# YOLO不原生支持，但可以在这里加自定义字段
judgement:
  smoke:
    levels: ['light', 'heavy']      # 轻烟 / 浓烟
    threshold: 0.5                  # 置信度阈值
  fire:
    levels: ['small', 'medium', 'large']  # 小火 / 中火 / 大火
    threshold: 0.5
